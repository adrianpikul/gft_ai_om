<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Copilot Usage Dashboard</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: rgba(255, 250, 242, 0.88);
      --panel-strong: #fff9f2;
      --ink: #1f2a37;
      --muted: #5d6b7b;
      --line: rgba(31, 42, 55, 0.12);
      --accent: #0f766e;
      --accent-soft: rgba(15, 118, 110, 0.16);
      --accent-warm: #c2410c;
      --accent-cool: #1d4ed8;
      --danger: #b91c1c;
      --ok: #15803d;
      --shadow: 0 24px 60px rgba(31, 42, 55, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(29, 78, 216, 0.12), transparent 28%),
        radial-gradient(circle at left 20%, rgba(194, 65, 12, 0.10), transparent 24%),
        linear-gradient(180deg, #f9f4ed 0%, var(--bg) 48%, #efe7dd 100%);
      min-height: 100vh;
    }

    .page {
      max-width: 1380px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    .hero {
      background: linear-gradient(145deg, rgba(255, 249, 242, 0.95), rgba(247, 240, 229, 0.88));
      border: 1px solid rgba(255, 255, 255, 0.75);
      box-shadow: var(--shadow);
      border-radius: 28px;
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -30px -70px auto;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(15, 118, 110, 0.18), transparent 70%);
      pointer-events: none;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3.8rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
      font-family: "Space Grotesk", "Aptos", sans-serif;
    }

    .hero p {
      margin: 0;
      max-width: 780px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .hero-meta {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(31, 42, 55, 0.08);
      color: var(--ink);
      font-size: 0.92rem;
    }

    .loader {
      margin-top: 22px;
      display: grid;
      gap: 12px;
    }

    .loader-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .button,
    .file-label {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      cursor: pointer;
      transition: transform 140ms ease, opacity 140ms ease, box-shadow 140ms ease;
    }

    .button:hover,
    .file-label:hover {
      transform: translateY(-1px);
    }

    .button {
      background: var(--accent);
      color: white;
      box-shadow: 0 12px 24px rgba(15, 118, 110, 0.18);
    }

    .button.secondary,
    .file-label {
      background: rgba(255, 255, 255, 0.78);
      color: var(--ink);
      border: 1px solid rgba(31, 42, 55, 0.10);
      box-shadow: none;
    }

    #fileInput {
      display: none;
    }

    .status {
      color: var(--muted);
      font-size: 0.94rem;
      min-height: 1.2em;
    }

    .grid {
      display: grid;
      gap: 18px;
      margin-top: 22px;
    }

    .kpi-grid {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .content-grid {
      grid-template-columns: repeat(12, minmax(0, 1fr));
      align-items: start;
    }

    .card {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow);
      border-radius: 24px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    .kpi-card {
      position: relative;
      overflow: hidden;
    }

    .kpi-card::after {
      content: "";
      position: absolute;
      inset: auto -18px -20px auto;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, rgba(15, 118, 110, 0.10), transparent 72%);
    }

    .kpi-label {
      display: block;
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 8px;
    }

    .kpi-value {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      font-family: "Space Grotesk", "Aptos", sans-serif;
    }

    .kpi-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .span-12 { grid-column: span 12; }
    .span-8 { grid-column: span 8; }
    .span-6 { grid-column: span 6; }
    .span-4 { grid-column: span 4; }

    @media (max-width: 1080px) {
      .span-8,
      .span-6,
      .span-4 {
        grid-column: span 12;
      }
    }

    h2 {
      margin: 0 0 14px;
      font-size: 1.1rem;
      letter-spacing: -0.03em;
    }

    .subtle {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .chart {
      display: grid;
      gap: 10px;
    }

    .chart-row {
      display: grid;
      grid-template-columns: 160px 1fr auto;
      gap: 10px;
      align-items: center;
      font-size: 0.92rem;
    }

    .bar-track {
      width: 100%;
      height: 14px;
      border-radius: 999px;
      background: rgba(31, 42, 55, 0.08);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), #14b8a6);
    }

    .stack {
      display: flex;
      width: 100%;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(31, 42, 55, 0.08);
      min-height: 14px;
    }

    .segment-success {
      background: linear-gradient(90deg, #16a34a, #4ade80);
    }

    .segment-failure {
      background: linear-gradient(90deg, #ef4444, #f97316);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
    }

    th,
    td {
      padding: 12px 10px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .heatmap {
      display: grid;
      grid-template-columns: 90px repeat(24, minmax(14px, 1fr));
      gap: 6px;
      align-items: center;
      font-size: 0.74rem;
    }

    .heatmap .hour {
      text-align: center;
      color: var(--muted);
    }

    .heatmap .day {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .cell {
      width: 100%;
      min-height: 18px;
      border-radius: 6px;
      background: rgba(31, 42, 55, 0.06);
    }

    .timeline {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 10px;
      align-items: end;
      min-height: 230px;
    }

    .timeline-bar {
      display: grid;
      gap: 6px;
      align-items: end;
      justify-items: stretch;
    }

    .timeline-bar-fill {
      background: linear-gradient(180deg, var(--accent-cool), var(--accent));
      border-radius: 16px 16px 6px 6px;
      min-height: 6px;
    }

    .timeline-label {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .timeline-value {
      text-align: center;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .split {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .metric-list {
      display: grid;
      gap: 10px;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--line);
      font-size: 0.94rem;
    }

    .empty {
      padding: 22px;
      border: 1px dashed rgba(31, 42, 55, 0.18);
      border-radius: 18px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.45);
    }

    .small {
      font-size: 0.82rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>Copilot Usage Dashboard</h1>
      <p>Monthly telemetry from VS Code Chat hooks. This dashboard tries to read the current month's file from <code>./data/</code> and falls back to loading a JSON file directly when opened from disk.</p>
      <div class="hero-meta">
        <span class="pill">Metadata-only storage</span>
        <span class="pill">VS Code Chat hook coverage</span>
        <span class="pill">Static HTML, no backend</span>
      </div>
      <div class="loader">
        <div class="loader-row">
          <button id="loadDefaultButton" class="button" type="button">Load Current Month</button>
          <label class="file-label" for="fileInput">Open JSON File</label>
          <input id="fileInput" type="file" accept=".json,application/json">
          <button id="loadSampleButton" class="button secondary" type="button">Load Embedded Empty State</button>
        </div>
        <div id="status" class="status">Waiting for data.</div>
      </div>
    </section>

    <div id="app"></div>
  </div>

  <script>
    const emptyStore = {
      version: 1,
      updatedAt: null,
      summary: {
        totalEvents: 0,
        totalSessions: 0,
        firstEventAt: null,
        lastEventAt: null,
        eventTypeCounts: {},
        months: []
      },
      events: []
    };

    const dayLabels = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    function formatNumber(value) {
      return new Intl.NumberFormat().format(value || 0);
    }

    function formatPercent(value) {
      return `${(value || 0).toFixed(1)}%`;
    }

    function formatDate(value) {
      if (!value) {
        return "n/a";
      }
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? value : date.toLocaleString();
    }

    function getCurrentMonthlyDataPath() {
      const now = new Date();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const year = String(now.getFullYear());
      return `./data/copilot_usage_${month}_${year}.json`;
    }

    function median(values) {
      if (!values.length) {
        return 0;
      }
      const sorted = [...values].sort((a, b) => a - b);
      const middle = Math.floor(sorted.length / 2);
      if (sorted.length % 2 === 0) {
        return (sorted[middle - 1] + sorted[middle]) / 2;
      }
      return sorted[middle];
    }

    function hoursBetween(start, end) {
      const a = new Date(start);
      const b = new Date(end);
      if (Number.isNaN(a.getTime()) || Number.isNaN(b.getTime())) {
        return null;
      }
      return (b.getTime() - a.getTime()) / 1000;
    }

    function summarize(store) {
      const events = Array.isArray(store.events) ? [...store.events] : [];
      events.sort((a, b) => String(a.timestamp || "").localeCompare(String(b.timestamp || "")));

      const sessions = new Map();
      const promptLengths = [];
      const tools = new Map();
      const subagents = new Map();
      const errors = new Map();
      const compaction = { auto: 0, manual: 0, unknown: 0 };
      const monthly = new Map();
      const heatmap = Array.from({ length: 7 }, () => Array(24).fill(0));
      const promptsByHour = Array(24).fill(0);
      const eventTypeCounts = new Map();
      const toolQueue = new Map();
      const toolDurations = [];
      let successTools = 0;
      let failedTools = 0;

      for (const event of events) {
        const eventType = event.eventType || "unknown";
        eventTypeCounts.set(eventType, (eventTypeCounts.get(eventType) || 0) + 1);
        const sessionId = event.sessionId || "unknown";
        if (!sessions.has(sessionId)) {
          sessions.set(sessionId, {
            sessionId,
            start: null,
            end: null,
            endReason: null,
            promptCount: 0,
            toolEvents: 0
          });
        }

        const session = sessions.get(sessionId);
        const stamp = event.timestamp ? new Date(event.timestamp) : null;
        const month = event.month || (event.timestamp ? String(event.timestamp).slice(0, 7) : "unknown");
        if (!monthly.has(month)) {
          monthly.set(month, {
            month,
            sessions: new Set(),
            prompts: 0,
            tools: 0,
            errors: 0
          });
        }
        monthly.get(month).sessions.add(sessionId);

        if (stamp && !Number.isNaN(stamp.getTime())) {
          heatmap[stamp.getDay()][stamp.getHours()] += 1;
        }

        switch (eventType) {
          case "SessionStart": {
            session.start = event.timestamp || session.start;
            break;
          }
          case "Stop": {
            session.end = event.timestamp || session.end;
            session.endReason = event.metadata?.stopReason || "unknown";
            break;
          }
          case "UserPromptSubmit": {
            session.promptCount += 1;
            monthly.get(month).prompts += 1;
            promptLengths.push(event.metadata?.promptLength || 0);
            if (stamp && !Number.isNaN(stamp.getTime())) {
              promptsByHour[stamp.getHours()] += 1;
            }
            break;
          }
          case "PreToolUse": {
            session.toolEvents += 1;
            monthly.get(month).tools += 1;
            const name = event.metadata?.toolName || "unknown";
            if (!tools.has(name)) {
              tools.set(name, { name, pre: 0, success: 0, failure: 0, durations: [] });
            }
            tools.get(name).pre += 1;
            if (!toolQueue.has(sessionId)) {
              toolQueue.set(sessionId, new Map());
            }
            const byTool = toolQueue.get(sessionId);
            if (!byTool.has(name)) {
              byTool.set(name, []);
            }
            byTool.get(name).push(event);
            break;
          }
          case "PostToolUse": {
            const name = event.metadata?.toolName || "unknown";
            if (!tools.has(name)) {
              tools.set(name, { name, pre: 0, success: 0, failure: 0, durations: [] });
            }
            tools.get(name).success += 1;
            successTools += 1;
            const byTool = toolQueue.get(sessionId);
            if (byTool && byTool.has(name) && byTool.get(name).length) {
              const startEvent = byTool.get(name).shift();
              const duration = hoursBetween(startEvent.timestamp, event.timestamp);
              if (duration !== null) {
                const millis = duration * 1000;
                tools.get(name).durations.push(millis);
                toolDurations.push(millis);
              }
            }
            break;
          }
          case "SubagentStart":
          case "SubagentStop": {
            const name = event.metadata?.agentName || "unknown";
            if (!subagents.has(name)) {
              subagents.set(name, { name, starts: 0, stops: 0 });
            }
            if (eventType === "SubagentStart") {
              subagents.get(name).starts += 1;
            } else {
              subagents.get(name).stops += 1;
            }
            break;
          }
          case "ErrorOccurred": {
            const context = event.metadata?.errorContext || "unknown";
            errors.set(context, (errors.get(context) || 0) + 1);
            monthly.get(month).errors += 1;
            failedTools += 1;
            break;
          }
          case "PreCompact": {
            const trigger = event.metadata?.trigger || "unknown";
            compaction[trigger] = (compaction[trigger] || 0) + 1;
            break;
          }
        }
      }

      const sessionList = [...sessions.values()].map((session) => {
        const durationSeconds = session.start && session.end ? hoursBetween(session.start, session.end) : null;
        return {
          ...session,
          durationSeconds
        };
      });

      const monthlyRows = [...monthly.values()]
        .map((row) => ({
          month: row.month,
          sessionCount: row.sessions.size,
          prompts: row.prompts,
          tools: row.tools,
          errors: row.errors
        }))
        .sort((a, b) => a.month.localeCompare(b.month));

      const toolRows = [...tools.values()]
        .map((row) => ({
          ...row,
          total: row.success + row.failure,
          medianDurationMs: median(row.durations)
        }))
        .sort((a, b) => b.pre - a.pre);

      const subagentRows = [...subagents.values()].sort((a, b) => (b.starts + b.stops) - (a.starts + a.stops));
      const errorRows = [...errors.entries()].map(([context, count]) => ({ context, count })).sort((a, b) => b.count - a.count);
      const eventRows = [...eventTypeCounts.entries()].map(([eventType, count]) => ({ eventType, count })).sort((a, b) => b.count - a.count);

      const completedSessions = sessionList.filter((session) => session.endReason === "complete").length;
      const averagePromptsPerSession = sessionList.length ? promptLengths.length / sessionList.length : 0;
      const medianSessionSeconds = median(sessionList.map((session) => session.durationSeconds).filter((value) => typeof value === "number"));
      const medianToolMs = median(toolDurations);
      const successRate = successTools + failedTools ? (successTools / (successTools + failedTools)) * 100 : 0;

      return {
        events,
        sessions: sessionList,
        monthlyRows,
        toolRows,
        subagentRows,
        errorRows,
        eventRows,
        compaction,
        heatmap,
        promptsByHour,
        metrics: {
          totalEvents: events.length,
          totalSessions: sessionList.length,
          completedSessions,
          promptCount: promptLengths.length,
          averagePromptsPerSession,
          medianPromptLength: median(promptLengths),
          medianSessionSeconds,
          medianToolMs,
          successRate
        },
        latestUpdate: store.updatedAt || null
      };
    }

    function createKpi(label, value, note) {
      return `
        <article class="card kpi-card">
          <span class="kpi-label">${label}</span>
          <div class="kpi-value">${value}</div>
          <div class="kpi-note">${note}</div>
        </article>
      `;
    }

    function renderBars(rows, key, formatter) {
      if (!rows.length) {
        return `<div class="empty">No data yet.</div>`;
      }
      const max = Math.max(...rows.map((row) => row[key]), 1);
      return `
        <div class="chart">
          ${rows.map((row) => `
            <div class="chart-row">
              <div>${row.label}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${(row[key] / max) * 100}%"></div></div>
              <div>${formatter(row[key])}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderTimeline(rows) {
      if (!rows.length) {
        return `<div class="empty">No monthly data yet.</div>`;
      }
      const max = Math.max(...rows.map((row) => row.prompts), 1);
      return `
        <div class="timeline">
          ${rows.map((row) => `
            <div class="timeline-bar">
              <div class="timeline-value">${formatNumber(row.prompts)}</div>
              <div class="timeline-bar-fill" style="height:${Math.max(8, (row.prompts / max) * 180)}px"></div>
              <div class="timeline-label">${row.month}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderHeatmap(matrix) {
      const max = Math.max(1, ...matrix.flat());
      const header = [`<div></div>`].concat(Array.from({ length: 24 }, (_, hour) => `<div class="hour">${hour}</div>`)).join("");
      const rows = matrix.map((dayRow, dayIndex) => {
        const cells = dayRow.map((value) => {
          const intensity = value ? (value / max) : 0;
          const background = value
            ? `rgba(15, 118, 110, ${0.14 + intensity * 0.72})`
            : "rgba(31, 42, 55, 0.06)";
          return `<div class="cell" title="${dayLabels[dayIndex]} ${value}" style="background:${background}"></div>`;
        }).join("");
        return `<div class="day">${dayLabels[dayIndex]}</div>${cells}`;
      }).join("");
      return `<div class="heatmap">${header}${rows}</div>`;
    }

    function renderTable(headers, rows) {
      if (!rows.length) {
        return `<div class="empty">No rows yet.</div>`;
      }
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>${headers.map((header) => `<th>${header}</th>`).join("")}</tr>
            </thead>
            <tbody>
              ${rows.join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderDashboard(store) {
      const summary = summarize(store);
      const toolBars = summary.toolRows.slice(0, 8).map((row) => ({ label: row.name, value: row.pre }));
      const topToolTable = summary.toolRows.slice(0, 10).map((row) => `
        <tr>
          <td>${row.name}</td>
          <td>${formatNumber(row.pre)}</td>
          <td>${formatNumber(row.success)}</td>
          <td>${formatNumber(row.failure)}</td>
          <td>${formatNumber(Math.round(row.medianDurationMs || 0))} ms</td>
        </tr>
      `);
      const sessionTable = summary.sessions
        .slice()
        .sort((a, b) => String(b.start || "").localeCompare(String(a.start || "")))
        .slice(0, 12)
        .map((row) => `
          <tr>
            <td>${row.sessionId}</td>
            <td>${row.endReason || "open"}</td>
            <td>${row.start ? formatDate(row.start) : "n/a"}</td>
            <td>${row.durationSeconds !== null ? `${Math.round(row.durationSeconds)} s` : "n/a"}</td>
            <td>${formatNumber(row.promptCount)}</td>
            <td>${formatNumber(row.toolEvents)}</td>
          </tr>
        `);
      const subagentTable = summary.subagentRows.map((row) => `
        <tr>
          <td>${row.name}</td>
          <td>${formatNumber(row.starts)}</td>
          <td>${formatNumber(row.stops)}</td>
        </tr>
      `);
      const errorTable = summary.errorRows.map((row) => `
        <tr>
          <td>${row.context}</td>
          <td>${formatNumber(row.count)}</td>
        </tr>
      `);
      const eventTable = summary.eventRows.map((row) => `
        <tr>
          <td>${row.eventType}</td>
          <td>${formatNumber(row.count)}</td>
        </tr>
      `);
      const monthlyTable = summary.monthlyRows.map((row) => `
        <tr>
          <td>${row.month}</td>
          <td>${formatNumber(row.sessionCount)}</td>
          <td>${formatNumber(row.prompts)}</td>
          <td>${formatNumber(row.tools)}</td>
          <td>${formatNumber(row.errors)}</td>
        </tr>
      `);

      const app = document.getElementById("app");
      app.innerHTML = `
        <section class="grid kpi-grid">
          ${createKpi("Events logged", formatNumber(summary.metrics.totalEvents), `${formatNumber(summary.metrics.totalSessions)} sessions tracked`)}
          ${createKpi("Prompts", formatNumber(summary.metrics.promptCount), `${summary.metrics.averagePromptsPerSession.toFixed(1)} prompts per session`)}
          ${createKpi("Tool success", formatPercent(summary.metrics.successRate), `${formatNumber(summary.toolRows.length)} distinct tools`)}
          ${createKpi("Median prompt", `${Math.round(summary.metrics.medianPromptLength)} chars`, `${formatNumber(summary.errorRows.reduce((sum, row) => sum + row.count, 0))} errors logged`)}
          ${createKpi("Median session", `${Math.round(summary.metrics.medianSessionSeconds || 0)} s`, `${formatNumber(summary.metrics.completedSessions)} completed sessions`)}
          ${createKpi("Median tool run", `${Math.round(summary.metrics.medianToolMs || 0)} ms`, `${summary.latestUpdate ? `Updated ${formatDate(summary.latestUpdate)}` : "No updates yet"}`)}
        </section>

        <section class="grid content-grid">
          <article class="card span-8">
            <h2>Monthly Prompt Volume</h2>
            <p class="subtle">A quick monthly trend line for prompt traffic and overall VS Code Chat activity.</p>
            ${renderTimeline(summary.monthlyRows)}
          </article>

          <article class="card span-4">
            <h2>Usage Mix</h2>
            <div class="metric-list">
              <div class="metric"><span>Auto compact</span><strong>${formatNumber(summary.compaction.auto || 0)}</strong></div>
              <div class="metric"><span>Manual compact</span><strong>${formatNumber(summary.compaction.manual || 0)}</strong></div>
              <div class="metric"><span>Sessions ended</span><strong>${formatNumber(summary.sessions.filter((row) => row.endReason).length)}</strong></div>
              <div class="metric"><span>Distinct tools</span><strong>${formatNumber(summary.toolRows.length)}</strong></div>
              <div class="metric"><span>Distinct subagents</span><strong>${formatNumber(summary.subagentRows.length)}</strong></div>
              <div class="metric"><span>Error groups</span><strong>${formatNumber(summary.errorRows.length)}</strong></div>
            </div>
          </article>

          <article class="card span-6">
            <h2>Top Tools By Volume</h2>
            <p class="subtle">Most frequently entered tools based on <code>PreToolUse</code>.</p>
            ${renderBars(toolBars, "value", formatNumber)}
          </article>

          <article class="card span-8">
            <h2>Session Activity Heatmap</h2>
            <p class="subtle">All events by weekday and hour to show when VS Code Chat is most active.</p>
            ${renderHeatmap(summary.heatmap)}
          </article>

          <article class="card span-4">
            <h2>Tool Outcome Split</h2>
            <p class="subtle">Successful tool completions versus error events captured by the VS Code hook stream.</p>
            <div class="split">
              <div>
                <div class="stack">
                  <div class="segment-success" style="width:${summary.metrics.successRate}%"></div>
                  <div class="segment-failure" style="width:${100 - summary.metrics.successRate}%"></div>
                </div>
                <div class="metric-list">
                  <div class="metric"><span>Success rate</span><strong>${formatPercent(summary.metrics.successRate)}</strong></div>
                  <div class="metric"><span>Median tool duration</span><strong>${Math.round(summary.metrics.medianToolMs || 0)} ms</strong></div>
                  <div class="metric"><span>Error events</span><strong>${formatNumber(summary.errorRows.reduce((sum, row) => sum + row.count, 0))}</strong></div>
                </div>
              </div>
            </div>
          </article>

          <article class="card span-6">
            <h2>Top Tool Table</h2>
            ${renderTable(["Tool", "Pre", "Success", "Failure", "Median Duration"], topToolTable)}
          </article>

          <article class="card span-6">
            <h2>Session Outcomes</h2>
            ${renderTable(["Session", "Outcome", "Started", "Duration", "Prompts", "Tools"], sessionTable)}
          </article>

          <article class="card span-4">
            <h2>Subagent Activity</h2>
            ${renderTable(["Agent", "Starts", "Stops"], subagentTable)}
          </article>

          <article class="card span-4">
            <h2>Error Contexts</h2>
            ${renderTable(["Context", "Count"], errorTable)}
          </article>

          <article class="card span-6">
            <h2>Monthly Summary Table</h2>
            ${renderTable(["Month", "Sessions", "Prompts", "Tools", "Errors"], monthlyTable)}
          </article>

          <article class="card span-6">
            <h2>Event Coverage</h2>
            ${renderTable(["Event Type", "Count"], eventTable)}
          </article>
        </section>
      `;
    }

    async function loadDefaultJson() {
      const defaultPath = getCurrentMonthlyDataPath();
      try {
        const response = await fetch(defaultPath, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const data = await response.json();
        renderDashboard(data);
        setStatus(`Loaded ${defaultPath}`);
      } catch (error) {
        renderDashboard(emptyStore);
        setStatus(`Unable to auto-load ${defaultPath}. If you opened this file directly from disk, use “Open JSON File”.`);
      }
    }

    function loadFromFile(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(String(reader.result || "{}"));
          renderDashboard(data);
          setStatus(`Loaded ${file.name}`);
        } catch (error) {
          setStatus(`Failed to parse ${file.name}: ${error.message}`);
        }
      };
      reader.onerror = () => {
        setStatus(`Failed to read ${file.name}`);
      };
      reader.readAsText(file);
    }

    document.getElementById("loadDefaultButton").addEventListener("click", loadDefaultJson);
    document.getElementById("loadSampleButton").addEventListener("click", () => {
      renderDashboard(emptyStore);
      setStatus("Loaded empty dashboard state.");
    });
    document.getElementById("fileInput").addEventListener("change", (event) => {
      const [file] = event.target.files || [];
      if (file) {
        loadFromFile(file);
      }
    });

    renderDashboard(emptyStore);
  </script>
</body>
</html>
